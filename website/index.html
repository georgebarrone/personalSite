<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>George Barrone — Personal Site</title>
    <style>
      :root {
        --bg: #0f1724;
        --card: #0b1220;
        --accent: #0ea5e9;
        --muted: #9aa4b2;
      }
      
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family:
          Inter,
          system-ui,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        color: #e6eef6;
        background: linear-gradient(180deg, #071226 0%, #071b2b 100%);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.03),
          rgba(255, 255, 255, 0.01)
        );
        padding: 28px;
        border-radius: 14px;
        max-width: 720px;
        width: 92%;
        text-align: center;
        box-shadow: 0 8px 30px rgba(2, 6, 23, 0.6);
      }
      .avatar {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid rgba(255, 255, 255, 0.06);
        display: block;
        margin: 0 auto 18px;
      }
      h1 {
        margin: 8px 0 6px;
        font-size: 1.6rem;
      }
      p {
        color: var(--muted);
        margin: 0 0 18px;
        line-height: 1.5;
      }
      .buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        color: #041827;
        background: rgba(255, 255, 255, 0.95);
      }
      .btn svg {
        width: 18px;
        height: 18px;
        display: block;
      }
      .linkedin {
        background: #0a66c2; 
        color: white;
      }
      .github {
        background: #0e1116;
        color: white;
      }
      @media (max-width: 420px) {
        .avatar {
          width: 120px;
          height: 120px;
        }
        .card {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <img
          class="avatar"
          src="https://media.discordapp.net/attachments/883599210258255902/1450264441340821566/IMG_4415.jpg?ex=69d43e03&is=69d2ec83&hm=ee263a35bd4db016a8385a1ce5c4ecb040ececaf7192e703a14f567b10a1b781&=&format=webp&width=678&height=904"
          alt="George Barrone photo"
        />
      <h1>George Barrone</h1>
      <p>
        I'm a new 2026 CS graduate. I love reading and watching movies and I am
        very passionate about both things — seeking a job in the CS field.
      </p>
        
      <div class="buttons">
        <a
          class="btn linkedin"
          href="https://www.linkedin.com/in/george-barrone-a9759421a/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg
            viewBox="0 0 34 34"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
            focusable="false"
          >
            <rect width="34" height="34" rx="4" fill="#0A66C2" />
            <path
              d="M8.6 12.3h3.5V26h-3.5v-13.7zm1.7-6.5a2 2 0 11-.001 3.999A2 2 0 0110.3 5.8zM16.1 12.3c1.9 0 3 1.1 3.5 1.9V13h3.5v13.9h-3.5v-7.7c0-2-1.1-3.6-3-3.6-1.6 0-2.4 1.1-2.8 2.1-.1.3-.1.8-.1 1.3v8H11v-13.7h3.1v1.8c.5-.8 1.7-1.6 2.9-1.6z"
              fill="#fff"
            />
          </svg>
          LinkedIn
        </a>

        <a
          class="btn github"
          href="https://github.com/georgebarrone"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
            focusable="false"
          >
            <path
              fill="#fff"
              d="M12 .297a12 12 0 00-3.79 23.4c.6.11.82-.26.82-.58v-2.16c-3.34.73-4.04-1.61-4.04-1.61-.55-1.4-1.35-1.77-1.35-1.77-1.1-.75.08-.74.08-.74 1.22.09 1.86 1.26 1.86 1.26 1.08 1.85 2.84 1.32 3.54 1.01.11-.78.42-1.32.76-1.62-2.67-.3-5.47-1.34-5.47-5.95 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.17 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.24 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.62-2.8 5.65-5.48 5.95.43.37.81 1.1.81 2.22v3.29c0 .32.21.7.82.58A12 12 0 0012 .297"
            />
          </svg>
          GitHub
        </a>
      </div>
    </main>
  </body>
</html>
